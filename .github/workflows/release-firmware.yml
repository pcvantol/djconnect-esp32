name: Release firmware

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta"

jobs:
  release-info:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      channel: ${{ steps.version.outputs.channel }}
      min_ha_integration: ${{ steps.version.outputs.min_ha_integration }}
      max_ha_integration: ${{ steps.version.outputs.max_ha_integration }}
      lilygo_bin: ${{ steps.version.outputs.lilygo_bin }}
      box3_bin: ${{ steps.version.outputs.box3_bin }}
      manifest: ${{ steps.version.outputs.manifest }}

    steps:
      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          CHANNEL="stable"
          if [[ "${RAW}" == *-beta ]]; then
            CHANNEL="beta"
            VERSION="${RAW%-beta}"
            VERSION_TAG="v${VERSION}-beta"
            LILYGO_BIN="djconnect-lilygo-t-embed-s3-beta-v${VERSION}.bin"
            BOX3_BIN="djconnect-esp32-s3-box-3-beta-v${VERSION}.bin"
            MANIFEST="firmware_manifest_beta.json"
          else
            VERSION="${RAW}"
            VERSION_TAG="v${VERSION}"
            LILYGO_BIN="djconnect-lilygo-t-embed-s3-v${VERSION}.bin"
            BOX3_BIN="djconnect-esp32-s3-box-3-v${VERSION}.bin"
            MANIFEST="firmware_manifest.json"
          fi
          IFS=. read -r MAJOR MINOR PATCH <<< "${VERSION}"
          MIN_HA_INTEGRATION="${MAJOR}.${MINOR}.0"
          MAX_HA_INTEGRATION="${MAJOR}.$((MINOR + 1)).0"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "min_ha_integration=$MIN_HA_INTEGRATION" >> "$GITHUB_OUTPUT"
          echo "max_ha_integration=$MAX_HA_INTEGRATION" >> "$GITHUB_OUTPUT"
          echo "lilygo_bin=$LILYGO_BIN" >> "$GITHUB_OUTPUT"
          echo "box3_bin=$BOX3_BIN" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

  build-release:
    needs: release-info
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - env: t_embed_cc1101
            device: lilygo-t-embed-s3
            asset_output: lilygo_bin
          - env: esp32_s3_box3
            device: esp32-s3-box-3
            asset_output: box3_bin

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Update build dependencies
        run: |
          mkdir -p "release/${{ matrix.env }}"
          REPORT_DIR="release/${{ matrix.env }}" scripts/update_build_dependencies.sh "${{ matrix.env }}"

      - name: Build firmware
        run: |
          VERSION="${{ needs.release-info.outputs.version }}"
          VERSION_TAG="${{ needs.release-info.outputs.version_tag }}"
          export DJCONNECT_BUILD_FLAGS="-DDJCONNECT_VERSION=${VERSION} -DDJCONNECT_VERSION_TAG=${VERSION_TAG} -DDJCONNECT_RELEASE_BUILD=1 -Os"
          export PLATFORMIO_BUILD_DIR=".pio/build-release/${{ matrix.env }}"
          pio run -e "${{ matrix.env }}"

      - name: Verify embedded firmware version
        run: |
          VERSION="${{ needs.release-info.outputs.version }}"
          VERSION_TAG="${{ needs.release-info.outputs.version_tag }}"
          FIRMWARE_DIR=".pio/build-release/${{ matrix.env }}/${{ matrix.env }}"
          if ! strings "${FIRMWARE_DIR}/firmware.elf" | grep -q "DJConnect ${VERSION_TAG} / ${VERSION} booting"; then
            echo "${{ matrix.env }} firmware boot marker does not contain expected release version ${VERSION_TAG} / ${VERSION}" >&2
            exit 1
          fi
          if strings "${FIRMWARE_DIR}/firmware.bin" | grep -Eq "(^|[^[:alnum:]])vdev([^[:alnum:]]|$)|DJConnect dev / dev booting"; then
            echo "${{ matrix.env }} firmware binary still contains a dev version placeholder" >&2
            exit 1
          fi

      - name: Prepare firmware artifact
        run: |
          if [[ "${{ matrix.asset_output }}" == "lilygo_bin" ]]; then
            ASSET="${{ needs.release-info.outputs.lilygo_bin }}"
          else
            ASSET="${{ needs.release-info.outputs.box3_bin }}"
          fi
          FIRMWARE_DIR=".pio/build-release/${{ matrix.env }}/${{ matrix.env }}"
          cp "${FIRMWARE_DIR}/firmware.bin" "release/${{ matrix.env }}/${ASSET}"
          SHA256=$(sha256sum "release/${{ matrix.env }}/${ASSET}" | awk '{print $1}')
          SIZE=$(stat -c%s "release/${{ matrix.env }}/${ASSET}")
          echo "${SHA256}  ${ASSET}" > "release/${{ matrix.env }}/${ASSET}.sha256"
          cat > "release/${{ matrix.env }}/metadata.env" <<EOF
          BOARD=${{ matrix.env }}
          DEVICE=${{ matrix.device }}
          ASSET=${ASSET}
          SHA256=${SHA256}
          SIZE=${SIZE}
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: release/${{ matrix.env }}/*
          if-no-files-found: error

  publish-release:
    needs:
      - release-info
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.release-info.outputs.version }}"
          VERSION_TAG="${{ needs.release-info.outputs.version_tag }}"
          CHANNEL="${{ needs.release-info.outputs.channel }}"
          MIN_HA_INTEGRATION="${{ needs.release-info.outputs.min_ha_integration }}"
          MAX_HA_INTEGRATION="${{ needs.release-info.outputs.max_ha_integration }}"
          MANIFEST="${{ needs.release-info.outputs.manifest }}"

          mkdir -p release
          cp artifacts/firmware-t_embed_cc1101/* release/
          cp artifacts/firmware-esp32_s3_box3/* release/

          source artifacts/firmware-t_embed_cc1101/metadata.env
          LILYGO_BOARD="$BOARD"
          LILYGO_DEVICE="$DEVICE"
          LILYGO_ASSET="$ASSET"
          LILYGO_SHA256="$SHA256"
          LILYGO_SIZE="$SIZE"

          source artifacts/firmware-esp32_s3_box3/metadata.env
          BOX3_BOARD="$BOARD"
          BOX3_DEVICE="$DEVICE"
          BOX3_ASSET="$ASSET"
          BOX3_SHA256="$SHA256"
          BOX3_SIZE="$SIZE"

          rm release/metadata.env

          cat > "release/${MANIFEST}" <<EOF
          {
            "version": "${VERSION}",
            "version_tag": "${VERSION_TAG}",
            "channel": "${CHANNEL}",
            "min_ha_integration": "${MIN_HA_INTEGRATION}",
            "max_ha_integration": "${MAX_HA_INTEGRATION}",
            "release_notes": "https://github.com/pcvantol/djconnect-firmware/releases/tag/${VERSION_TAG}",
            "firmwares": [
              {
                "board": "${LILYGO_BOARD}",
                "device": "${LILYGO_DEVICE}",
                "asset": "${LILYGO_ASSET}",
                "url": "https://github.com/pcvantol/djconnect-firmware/releases/download/${VERSION_TAG}/${LILYGO_ASSET}",
                "sha256": "${LILYGO_SHA256}",
                "size": ${LILYGO_SIZE}
              },
              {
                "board": "${BOX3_BOARD}",
                "device": "${BOX3_DEVICE}",
                "asset": "${BOX3_ASSET}",
                "url": "https://github.com/pcvantol/djconnect-firmware/releases/download/${VERSION_TAG}/${BOX3_ASSET}",
                "sha256": "${BOX3_SHA256}",
                "size": ${BOX3_SIZE}
              }
            ]
          }
          EOF

      - name: Prepare release notes
        run: |
          scripts/extract_release_changelog.sh "${{ needs.release-info.outputs.version_tag }}" CHANGELOG.md > release-notes.md

      - name: Publish GitHub Release to public firmware repo
        uses: softprops/action-gh-release@v2
        with:
          repository: pcvantol/djconnect-firmware
          token: ${{ secrets.FIRMWARE_RELEASE_TOKEN }}
          tag_name: ${{ needs.release-info.outputs.version_tag }}
          name: DJConnect Firmware ${{ needs.release-info.outputs.version_tag }}
          prerelease: ${{ needs.release-info.outputs.channel == 'beta' }}
          body_path: release-notes.md
          files: |
            release/${{ needs.release-info.outputs.lilygo_bin }}
            release/${{ needs.release-info.outputs.lilygo_bin }}.sha256
            release/${{ needs.release-info.outputs.box3_bin }}
            release/${{ needs.release-info.outputs.box3_bin }}.sha256
            release/${{ needs.release-info.outputs.manifest }}
        env:
          GITHUB_TOKEN: ${{ secrets.FIRMWARE_RELEASE_TOKEN }}
