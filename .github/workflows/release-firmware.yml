name: Release firmware

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta"

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      FIRMWARE_REPO: pcvantol/djconnect-firmware
      DEVICE: lilygo-t-embed-s3
      PROJECT: djconnect

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          CHANNEL="stable"
          if [[ "${RAW}" == *-beta ]]; then
            CHANNEL="beta"
            VERSION="${RAW%-beta}"
            VERSION_TAG="v${VERSION}-beta"
            BIN="djconnect-device-beta-v${VERSION}.bin"
            MANIFEST="firmware_manifest_beta.json"
          else
            VERSION="${RAW}"
            VERSION_TAG="v${VERSION}"
            BIN="djconnect-device-v${VERSION}.bin"
            MANIFEST="firmware_manifest.json"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          export DJCONNECT_BUILD_FLAGS="-DDJCONNECT_VERSION=${VERSION} -DDJCONNECT_VERSION_TAG=${VERSION_TAG}"
          pio run -e t_embed_cc1101

      - name: Verify embedded firmware version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          if ! strings .pio/build/t_embed_cc1101/firmware.elf | grep -q "DJConnect ${VERSION_TAG} / ${VERSION} booting"; then
            echo "Firmware boot marker does not contain expected release version ${VERSION_TAG} / ${VERSION}" >&2
            exit 1
          fi
          if strings .pio/build/t_embed_cc1101/firmware.bin | grep -Eq "(^|[^[:alnum:]])vdev([^[:alnum:]]|$)|DJConnect dev / dev booting"; then
            echo "Firmware binary still contains a dev version placeholder" >&2
            exit 1
          fi

      - name: Prepare release assets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          BIN="${{ steps.version.outputs.bin }}"
          MANIFEST="${{ steps.version.outputs.manifest }}"

          mkdir -p release

          cp .pio/build/*/firmware.bin "release/${BIN}"

          SHA256=$(sha256sum "release/${BIN}" | awk '{print $1}')
          SIZE=$(stat -c%s "release/${BIN}")

          cat > "release/${MANIFEST}" <<EOF
          {
            "version": "${VERSION}",
            "version_tag": "${VERSION_TAG}",
            "device": "lilygo-t-embed-s3",
            "channel": "${CHANNEL}",
            "asset": "${BIN}",
            "url": "https://github.com/pcvantol/djconnect-firmware/releases/download/${VERSION_TAG}/${BIN}",
            "sha256": "${SHA256}",
            "size": ${SIZE},
            "min_ha_integration": "1.0.0",
            "release_notes": "https://github.com/pcvantol/djconnect-firmware/releases/tag/${VERSION_TAG}"
          }
          EOF

          echo "${SHA256}  ${BIN}" > "release/${BIN}.sha256"

      - name: Publish GitHub Release to public firmware repo
        uses: softprops/action-gh-release@v2
        with:
          repository: pcvantol/djconnect-firmware
          token: ${{ secrets.FIRMWARE_RELEASE_TOKEN }}
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: DJConnect Firmware ${{ steps.version.outputs.version_tag }}
          body: |
            DJConnect firmware ${{ steps.version.outputs.version_tag }}

            Device: `lilygo-t-embed-s3`
            Channel: `${{ steps.version.outputs.channel }}`

            Binary:
            `${{ steps.version.outputs.bin }}`
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.FIRMWARE_RELEASE_TOKEN }}
