name: Firmware CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install native test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio
          pio pkg install -e t_embed_cc1101

      - name: Build native unit tests
        run: |
          c++ -std=c++17 \
            -Iinclude \
            -I.pio/libdeps/t_embed_cc1101/ArduinoJson/src \
            test/native/test_logic.cpp \
            -o /tmp/djconnect_unit_tests

      - name: Run native unit tests
        run: /tmp/djconnect_unit_tests

  postman-collections:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate Postman collections
        run: python3 test/native/test_postman_collections.py

  release-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run release-script checks
        run: bash test/native/test_release.sh

      - name: Run release dry-run
        run: ./release.sh 99.99.99 --dry-run

  platformio-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build LilyGO firmware
        run: pio run -e t_embed_cc1101
